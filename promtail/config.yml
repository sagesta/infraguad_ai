server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:
  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: local-server
          host: __hostname__
          env: production
          __path__: /var/log/syslog

  - job_name: authlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: local-server
          host: __hostname__
          env: production
          __path__: /var/log/auth.log

  - job_name: kernlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: local-server
          host: __hostname__
          env: production
          __path__: /var/log/kern.log

  # Docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: local-server
          host: __hostname__
          env: production
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
