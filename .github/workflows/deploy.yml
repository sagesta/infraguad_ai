name: Deploy InfraGuard AI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: infraguard-ai

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker images
        run: |
          REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}"

          docker build -f agent/Dockerfile -t ${REGISTRY}/agent:latest -t ${REGISTRY}/agent-${{ github.sha }} .
          docker build -f api/Dockerfile -t ${REGISTRY}/api:latest -t ${REGISTRY}/api-${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}"

          docker push ${REGISTRY}/agent:latest
          docker push ${REGISTRY}/agent-${{ github.sha }}
          docker push ${REGISTRY}/api:latest
          docker push ${REGISTRY}/api-${{ github.sha }}

      - name: Deploy to GCE VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Export the variable so docker compose can inherit it
            export REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}"

            # Change to project directory (using the actual git repo name)
            cd ~/infraguad_ai

            # Authenticate the VM's Docker daemon to the Artifact Registry
            gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

            # Pull the latest synchronized images
            docker pull ${REGISTRY}/agent:latest
            docker pull ${REGISTRY}/api:latest

            # Restart the orchestrated services
            docker compose down
            docker compose up -d

            echo "Deployment complete at $(date)"
