name: Deploy InfraGuard AI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: infraguard-ai

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve Artifact Registry settings
        env:
          GCP_REGION_SECRET: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
        run: |
          GCP_REGION_NORMALIZED="${GCP_REGION_SECRET%-docker.pkg.dev}"
          REGISTRY="${GCP_REGION_NORMALIZED}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}"

          echo "GCP_REGION_NORMALIZED=${GCP_REGION_NORMALIZED}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${GCP_REGION_NORMALIZED}-docker.pkg.dev" --quiet

      - name: Verify Artifact Registry repository
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REGISTRY_REPO}" \
            --location "${GCP_REGION_NORMALIZED}" \
            --project "${GCP_PROJECT_ID}" >/dev/null

      - name: Build Docker images
        run: |
          docker build -f agent/Dockerfile -t ${REGISTRY}/agent:latest -t ${REGISTRY}/agent:${{ github.sha }} .
          docker build -f api/Dockerfile -t ${REGISTRY}/api:latest -t ${REGISTRY}/api:${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          docker push ${REGISTRY}/agent:latest
          docker push ${REGISTRY}/agent:${{ github.sha }}
          docker push ${REGISTRY}/api:latest
          docker push ${REGISTRY}/api:${{ github.sha }}

      - name: Write .env on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            E="$HOME/infraguad_ai/.env"
            mkdir -p "$HOME/infraguad_ai"
            # Secret values are substituted by GitHub Actions on the runner before the script is sent to the VM.
            : > "$E"
            echo "INFRAGUARD_USERNAME=${{ secrets.INFRAGUARD_USERNAME }}" >> "$E"
            echo "INFRAGUARD_PASSWORD=${{ secrets.INFRAGUARD_PASSWORD }}" >> "$E"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> "$E"
            echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> "$E"
            echo "GCP_REGION=${{ secrets.GCP_REGION }}" >> "$E"
            echo "LOKI_URL=${{ secrets.LOKI_URL }}" >> "$E"
            echo "PROMETHEUS_URL=${{ secrets.PROMETHEUS_URL }}" >> "$E"
            echo "NTFY_TOPIC=${{ secrets.NTFY_TOPIC }}" >> "$E"
            echo "PROBE_URLS=${{ secrets.PROBE_URLS }}" >> "$E"
            echo "CROWDSEC_API_URL=${{ secrets.CROWDSEC_API_URL }}" >> "$E"
            echo "CROWDSEC_API_KEY=${{ secrets.CROWDSEC_API_KEY }}" >> "$E"
            echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> "$E"
            echo "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" >> "$E"
            echo "GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-key.json" >> "$E"
            echo "DEVPLANNER_CONTAINER_NAME=devplanner-api-1" >> "$E"
            echo "MONITORED_CONTAINERS=devplanner-api-1" >> "$E"
            echo "USE_LANGCHAIN_AGENT=1" >> "$E"
            echo "DB_PATH=/data/verdicts.db" >> "$E"
            echo "DOCKER_HOST=unix:///var/run/docker.sock" >> "$E"
            chmod 600 "$E"

      - name: Deploy to GCE VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Compute REGISTRY and write it into .env so docker compose can interpolate image names
            GCP_REGION="${{ secrets.GCP_REGION }}"
            GCP_REGION="${GCP_REGION%-docker.pkg.dev}"
            REGISTRY="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}"

            # Append REGISTRY to .env for docker-compose image interpolation
            grep -q '^REGISTRY=' ~/infraguad_ai/.env 2>/dev/null && sed -i "s|^REGISTRY=.*|REGISTRY=${REGISTRY}|" ~/infraguad_ai/.env || echo "REGISTRY=${REGISTRY}" >> ~/infraguad_ai/.env

            # Change to project directory
            cd ~/infraguad_ai

            # Authenticate the VM's Docker daemon to the Artifact Registry
            gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

            # Pull the latest synchronized images
            docker pull ${REGISTRY}/agent:latest
            docker pull ${REGISTRY}/api:latest

            # Restart the orchestrated services
            docker compose down
            docker compose up -d

            echo "Deployment complete at $(date)"
