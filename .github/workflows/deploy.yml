name: Deploy InfraGuard AI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: infraguard-ai
  REGISTRY: ""
  GCP_REGION: ""

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve Artifact Registry settings
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
        run: |
          GCP_REGION="${GCP_REGION%-docker.pkg.dev}"
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "GCP_REGION=${GCP_REGION}" >> "$GITHUB_ENV"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build Docker images
        run: |
          docker build --no-cache -f agent/Dockerfile -t ${REGISTRY}/agent:latest .
          docker build --no-cache -f api/Dockerfile -t ${REGISTRY}/api:latest .

      - name: Push to Artifact Registry
        run: |
          docker push ${REGISTRY}/agent:latest
          docker push ${REGISTRY}/api:latest

      - name: Deploy to GCE VM
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ secrets.GCE_INSTANCE_NAME }}
          zone: ${{ secrets.GCE_ZONE }}
          ssh_private_key: ${{ secrets.GCE_SSH_KEY }}
          command: |
            cd /app
            export REGISTRY="${{ env.REGISTRY }}"
            cat > /app/.env <<EOF
            INFRAGUARD_USERNAME=${{ secrets.INFRAGUARD_USERNAME }}
            INFRAGUARD_PASSWORD=${{ secrets.INFRAGUARD_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_REGION=${{ secrets.GCP_REGION }}
            LOKI_URL=${{ secrets.LOKI_URL }}
            PROMETHEUS_URL=${{ secrets.PROMETHEUS_URL }}
            CROWDSEC_API_URL=${{ secrets.CROWDSEC_API_URL }}
            CROWDSEC_API_KEY=${{ secrets.CROWDSEC_API_KEY }}
            NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
            NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
            MONITORED_CONTAINERS=devplanner-api-1
            USE_LANGCHAIN_AGENT=1
            DB_PATH=/data/verdicts.db
            DOCKER_HOST=unix:///var/run/docker.sock
            GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-key.json
            HEARTBEAT_INTERVAL_SECONDS=120
            REGISTRY=${{ env.REGISTRY }}
            EOF
            gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet
            docker pull ${REGISTRY}/agent:latest
            docker pull ${REGISTRY}/api:latest
            docker compose down
            docker compose up -d
            sleep 5
            curl -f http://localhost:8000/health || exit 1
