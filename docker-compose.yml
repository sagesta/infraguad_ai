services:
  agent:
    mem_limit: 512m
    memswap_limit: 512m
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - .env
    environment:
      DB_PATH: /data/verdicts.db
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
      DEVPLANNER_CONTAINER_NAME: ${DEVPLANNER_CONTAINER_NAME:-devplanner-api}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
    volumes:
      - ./secrets/gcp-key.json:/run/secrets/gcp-key.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sqlite_data:/data
    networks:
      - default
      - devplanner_default

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/verdicts.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data: {}

networks:
  devplanner_default:
    external: true
