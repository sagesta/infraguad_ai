services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_PATH: /data/verdicts.db
    volumes:
      - sqlite_data:/data

  agent:
    build: .
    command: python -m agent.main
    env_file:
      - .env
    environment:
      DB_PATH: /data/verdicts.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data: {}
