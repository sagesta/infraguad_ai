services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - .env
    environment:
      DB_PATH: /data/verdicts.db
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
      SSH_KEY_PATH: /run/secrets/ssh-key
    volumes:
      - ./secrets/infraguard-key.json:/run/secrets/gcp-key.json:ro
      - ./secrets/ssh-key:/run/secrets/ssh-key:ro
      - sqlite_data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/verdicts.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data: {}
