version: "3.9"

services:
  api:
    image: ${REGISTRY}/api:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-key.json
      - PYTHONPATH=/app
      - DB_PATH=/data/verdicts.db
    volumes:
      - /app/credentials:/app/credentials:ro
      - sqlite_data:/data
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    image: ${REGISTRY}/agent:latest
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-key.json
      - PYTHONPATH=/app
      - DB_PATH=/data/verdicts.db
    volumes:
      - /app/credentials:/app/credentials:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sqlite_data:/data
    restart: unless-stopped
    depends_on:
      - api

volumes:
  sqlite_data: {}
  chroma_data: {}
